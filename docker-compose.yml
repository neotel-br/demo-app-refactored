services:
  demoapp:
    container_name: demoapp
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - demoapp_data:/demoapp/data
      - demoapp_static:/demoapp/static
    restart: always
    networks:
      - app-network

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always
    networks:
      - app-network
    depends_on:
      - demoapp

networks:
  app-network:
    driver: bridge

volumes:
  demoapp_data:
  demoapp_static:

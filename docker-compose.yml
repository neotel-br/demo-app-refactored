services:
  microtoken:
    container_name: microtoken
    build:
      context: ./microtoken/fastapi
      dockerfile: Dockerfile
    ports:
      - "3700:3700"
    env_file:
      - ./microtoken/.env
    restart: unless-stopped

  demoapp:
    container_name: demoapp
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - demoapp_data:/demoapp/data
      - demoapp_static:/demoapp/static
    restart: always
    depends_on:
      - microtoken
    networks:
      - app-network

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://demoapp:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always
    networks:
      - app-network
    depends_on:
      - demoapp

networks:
  app-network:
    driver: bridge

volumes:
  demoapp_data:
  demoapp_static:
